<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 80px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: #555;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        #message {
            margin-top: 16px;
            text-align: center;
            color: green;
        }

        #error {
            margin-top: 16px;
            text-align: center;
            color: red;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .footer a {
            color: #333;
        }
    </style>
</head>

<body>
    <h1>비밀번호 찾기</h1>
    <p>가입한 이메일을 입력하면 비밀번호 재설정 방법을 안내합니다.</p>

    <form id="forgotForm">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="example@email.com" required>

        <button type="submit">확인</button>
    </form>

    <div id="codeSection" style="display:none; margin-top:20px;">
        <label for="code">인증번호</label>

        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="code" placeholder="6자리 인증번호" style="flex:1;">
            <span id="timer" style="min-width:50px; color:#888;">60s</span>
        </div>

        <button id="verifyBtn">인증 확인</button>
    </div>

    <div id="resetSection" style="display:none;">
        <label for="newPassword">새 비밀번호</label>
        <input type="password" id="newPassword" placeholder="영문+숫자 포함">

        <button id="resetBtn">비밀번호 변경</button>
    </div>

    <div id="message"></div>
    <div id="error"></div>

    <div class="footer">
        <a href="/login.html">로그인으로 돌아가기</a>
    </div>

    <script>
        let timer = 60;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timer = 60;

            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${timer}s`;

            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = `${timer}s`;

                if (timer <= 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = '만료';
                }
            }, 1000);
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            savedEmail = email;

            const res = await fetch('/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('error').textContent = data.message;
                return;
            }

            document.getElementById('message').textContent = data.message;
            document.getElementById('codeSection').style.display = 'block';

            // 🔥 타이머 시작
            startTimer();
        });
        let savedEmail = '';

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            savedEmail = email;

            const res = await fetch('/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('error').textContent = data.message;
                return;
            }

            document.getElementById('message').textContent = data.message;
            document.getElementById('codeSection').style.display = 'block';
        });
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const code = document.getElementById('code').value;

            const res = await fetch('/auth/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: savedEmail, code })
            });

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('error').textContent = data.message;
                return;
            }

            document.getElementById('resetSection').style.display = 'block';
        });
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;

            const res = await fetch('/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: savedEmail, newPassword })
            });

            const data = await res.json();

            if (!res.ok) {
                document.getElementById('error').textContent = data.message;
                return;
            }

            alert('비밀번호 변경 완료');
            window.location.href = '/login.html';
        });
    </script>
</body>

</html>
