<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #555; }
    input { width: 100%; padding: 8px 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
    button { width: 100%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: 0.8; }
    #error { margin-top: 16px; text-align: center; color: red; }
    .footer { margin-top: 20px; text-align: center; font-size: 0.9rem; color: #888; }
    .footer a { color: #333; }
  </style>
</head>
<body>
  <h1>로그인</h1>
  <form id="loginForm">
    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="example@email.com" required>

    <label for="password">비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호" required>

    <button type="submit">로그인</button>
  </form>
  <div id="error"></div>
  <div class="footer">계정이 없나요? <a href="/signup.html">회원가입</a></div>

  <div class="footer" id="forgotPw" style="display:none;">
    비밀번호를 잊어버리셨나요? <a href="/forgot-password.html">비밀번호 찾기</a>
  </div>

  <script>
    let failCount = 0;
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').textContent = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '로그인 실패');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } catch (err) {
        failCount++;
        document.getElementById('error').textContent = `이메일 또는 비밀번호가 올바르지 않습니다. (${failCount})`;
        if (failCount >= 5) {
          document.getElementById('forgotPw').style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
