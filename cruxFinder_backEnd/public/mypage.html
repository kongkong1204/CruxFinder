<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f9f9f9;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem;
      margin: 0 0 16px;
      color: #333;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.88rem;
      color: #555;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 14px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.8; }
    .logout-btn {
      background: #fff;
      color: #888;
      border: 1px solid #ccc;
    }
    .msg {
      margin-top: 10px;
      font-size: 0.88rem;
      text-align: center;
    }
    .msg.ok { color: green; }
    .msg.err { color: red; }
    .nav { margin-bottom: 20px; }
    .nav a {
      font-size: 0.88rem;
      color: #555;
      text-decoration: none;
    }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/index.html">처음으로</a>
  </div>

  <h1>마이페이지</h1>
  <p class="subtitle">계정 정보와 신체 정보를 확인하고 수정할 수 있습니다.</p>

  <div class="card">
    <h2>내 정보</h2>
    <div class="info-row">
      <span class="info-label">이름</span>
      <span id="infoName">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">이메일</span>
      <span id="infoEmail">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">키</span>
      <span id="infoHeight">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">체중</span>
      <span id="infoWeight">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">팔 길이</span>
      <span id="infoArmReach">-</span>
    </div>
    <div class="msg" id="loadMsg"></div>
  </div>

  <div class="card" id="stepVerify">
    <h2>본인 확인</h2>
    <label for="currentPw">현재 비밀번호</label>
    <input type="password" id="currentPw" placeholder="현재 비밀번호 입력">
    <button id="verifyBtn">확인</button>
    <div class="msg" id="verifyMsg"></div>
  </div>

  <div class="card" id="accountEditCard" style="display:none">
    <h2>계정 정보 변경</h2>

    <label for="newName">새 이름</label>
    <input type="text" id="newName" placeholder="변경할 이름">

    <label for="newEmail">새 이메일</label>
    <input type="email" id="newEmail" placeholder="변경할 이메일">

    <label for="newPw">새 비밀번호</label>
    <input type="password" id="newPw" placeholder="영문 + 숫자 포함">

    <label for="newPwConfirm">새 비밀번호 재입력</label>
    <input type="password" id="newPwConfirm" placeholder="새 비밀번호 다시 입력">

    <button id="saveAccountBtn">계정 정보 저장</button>
    <div class="msg" id="accountMsg"></div>
  </div>

  <div class="card full" id="profileEditCard" style="display:none">
    <h2>신체 정보 변경</h2>

    <label for="heightCm">키(cm)</label>
    <input type="number" id="heightCm" placeholder="예: 172" step="0.1">

    <label for="weightKg">체중(kg)</label>
    <input type="number" id="weightKg" placeholder="예: 65" step="0.1">

    <label for="armReachCm">팔 길이(cm)</label>
    <input type="number" id="armReachCm" placeholder="예: 178" step="0.1">

    <button id="saveProfileBtn">신체 정보 저장</button>
    <div class="msg" id="profileMsg"></div>
  </div>

  <div class="card" id="deleteAccountCard" style="display:none">
    <h2>계정 탈퇴</h2>
    <p style="font-size:0.9rem; color:#777; line-height:1.5; margin-bottom:12px;">
      계정을 삭제하면 회원 정보와 신체 정보가 함께 삭제됩니다.
    </p>

    <label for="deletePassword">현재 비밀번호</label>
    <input type="password" id="deletePassword" placeholder="현재 비밀번호 입력">

    <button id="deleteAccountBtn" style="background:#d11f1f;">계정 탈퇴</button>
    <div class="msg" id="deleteMsg"></div>
  </div>

  <button class="logout-btn" id="logoutBtn">로그아웃</button>



  <script>
    const token = localStorage.getItem('token');
    let verifiedPassword = '';

    if (!token) {
      window.location.href = '/login.html';
    }

    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    function setMsg(id, text, type) {
      const el = document.getElementById(id);
      el.className = type ? `msg ${type}` : 'msg';
      el.textContent = text || '';
    }

    function showValue(value, suffix = '') {
      if (value === null || value === undefined || value === '') return '-';
      return `${value}${suffix}`;
    }

    async function readJson(res) {
      const text = await res.text();
      return text ? JSON.parse(text) : {};
    }

    function renderAccount(data) {
      document.getElementById('infoName').textContent = showValue(data.name);
      document.getElementById('infoEmail').textContent = showValue(data.email);

      document.getElementById('newName').value = data.name || '';
      document.getElementById('newEmail').value = data.email || '';
    }

    function renderProfile(profile) {
      const heightCm = profile?.heightCm;
      const weightKg = profile?.weightKg;
      const armReachCm = profile?.armReachCm;

      document.getElementById('infoHeight').textContent = showValue(heightCm, 'cm');
      document.getElementById('infoWeight').textContent = showValue(weightKg, 'kg');
      document.getElementById('infoArmReach').textContent = showValue(armReachCm, 'cm');

      document.getElementById('heightCm').value = heightCm ?? '';
      document.getElementById('weightKg').value = weightKg ?? '';
      document.getElementById('armReachCm').value = armReachCm ?? '';
    }

    async function loadMyPage() {
      try {
        const res = await fetch('/api/mypage/account', { headers });

        if (res.status === 401) {
          window.location.href = '/login.html';
          return;
        }

        const data = await readJson(res);

        if (!res.ok) {
          setMsg('loadMsg', data.message || '내 정보를 불러오지 못했습니다.', 'err');
          return;
        }

        renderAccount(data);
        renderProfile(data.profile);
        setMsg('loadMsg', '내 정보를 불러왔습니다.', 'ok');
      } catch (err) {
        setMsg('loadMsg', '서버 연결에 실패했습니다.', 'err');
      }
    }

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const password = document.getElementById('currentPw').value;
      const msgEl = document.getElementById('verifyMsg');

      msgEl.className = 'msg';
      msgEl.textContent = '';

      if (!password) {
        msgEl.className = 'msg err';
        msgEl.textContent = '현재 비밀번호를 입력해주세요.';
        return;
      }

      try {
        const res = await fetch('/users/verify-password', {
          method: 'POST',
          headers,
          body: JSON.stringify({ password }),
        });

        const data = await res.json();

        if (!res.ok) {
          msgEl.className = 'msg err';

          if (res.status === 401) {
            msgEl.textContent = '비밀번호가 일치하지 않습니다.';
          } else {
            msgEl.textContent = data.message || '본인 확인에 실패했습니다.';
          }

          return;
        }

        verifiedPassword = password;

        document.getElementById('stepVerify').style.display = 'none';
        document.getElementById('accountEditCard').style.display = 'block';
        document.getElementById('profileEditCard').style.display = 'block';
        document.getElementById('deleteAccountCard').style.display = 'block';

        msgEl.className = 'msg ok';
        msgEl.textContent = '본인 확인이 완료되었습니다.';

      } catch (err) {
        msgEl.className = 'msg err';
        msgEl.textContent = '서버 연결에 실패했습니다.';
      }
    });

    document.getElementById('saveAccountBtn').addEventListener('click', async () => {
      const name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const newPassword = document.getElementById('newPw').value;
      const newPasswordConfirm = document.getElementById('newPwConfirm').value;

      setMsg('accountMsg', '');

      if (!verifiedPassword) {
        setMsg('accountMsg', '먼저 본인 확인을 해주세요.', 'err');
        return;
      }

      if (!name && !email && !newPassword) {
        setMsg('accountMsg', '변경할 정보를 입력해주세요.', 'err');
        return;
      }

      if (newPassword || newPasswordConfirm) {
        if (!newPassword || !newPasswordConfirm) {
          setMsg('accountMsg', '새 비밀번호와 재입력 값을 모두 입력해주세요.', 'err');
          return;
        }

        if (newPassword !== newPasswordConfirm) {
          setMsg('accountMsg', '새 비밀번호가 서로 일치하지 않습니다.', 'err');
          return;
        }
      }

      const body = {
        currentPassword: verifiedPassword,
      };

      if (name) body.name = name;
      if (email) body.email = email;
      if (newPassword) body.newPassword = newPassword;

      const res = await fetch('/api/mypage/account', {
        method: 'PATCH',
        headers,
        body: JSON.stringify(body),
      });

      const data = await readJson(res);

      if (!res.ok) {
        setMsg('accountMsg', data.message || '계정 정보 변경에 실패했습니다.', 'err');
        return;
      }

      renderAccount(data);
      document.getElementById('newPw').value = '';
      document.getElementById('newPwConfirm').value = '';
      setMsg('accountMsg', '계정 정보가 저장되었습니다.', 'ok');

      if (email) {
        setTimeout(() => {
          alert('이메일이 변경되었습니다. 다시 로그인해주세요.');
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.href = '/login.html';
        }, 800);
      }
    });

    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const heightCm = document.getElementById('heightCm').value;
      const weightKg = document.getElementById('weightKg').value;
      const armReachCm = document.getElementById('armReachCm').value;

      setMsg('profileMsg', '');

      if (!heightCm && !weightKg && !armReachCm) {
        setMsg('profileMsg', '저장할 신체 정보를 입력해주세요.', 'err');
        return;
      }

      const res = await fetch('/api/mypage/profile', {
        method: 'PATCH',
        headers,
        body: JSON.stringify({
          heightCm: heightCm || null,
          weightKg: weightKg || null,
          armReachCm: armReachCm || null,
        }),
      });

      const data = await readJson(res);

      if (!res.ok) {
        setMsg('profileMsg', data.message || '신체 정보 저장에 실패했습니다.', 'err');
        return;
      }

      renderProfile(data);
      setMsg('profileMsg', '신체 정보가 저장되었습니다.', 'ok');
    });

    document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
      const password = document.getElementById('deletePassword').value;

      setMsg('deleteMsg', '');

      if (!password) {
        setMsg('deleteMsg', '현재 비밀번호를 입력해주세요.', 'err');
        return;
      }

      const confirmed = confirm('정말 계정을 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.');

      if (!confirmed) return;

      try {
        const res = await fetch('/api/mypage/account', {
          method: 'DELETE',
          headers,
          body: JSON.stringify({ password }),
        });

        const data = await readJson(res);

        if (!res.ok) {
          setMsg('deleteMsg', data.message || '계정 탈퇴에 실패했습니다.', 'err');
          return;
        }

        alert('계정이 삭제되었습니다.');
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/index.html';
      } catch (err) {
        setMsg('deleteMsg', '서버 연결에 실패했습니다.', 'err');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    });

    loadMyPage();
  </script>
</body>
</html>
