<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #555; }
    input { width: 100%; padding: 8px 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
    button { width: 100%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { opacity: 0.8; }
    #message { margin-top: 16px; text-align: center; font-weight: bold; color: green; }
    #error { margin-top: 16px; text-align: center; color: red; }
    .footer { margin-top: 20px; text-align: center; font-size: 0.9rem; color: #888; }
    .footer a { color: #333; }
  </style>
</head>
<body>
  <h1>회원가입</h1>
  <form id="signupForm">
    <label for="name">이름</label>
    <input type="text" id="name" placeholder="홍길동">

    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="example@email.com" required>

    <label for="password">비밀번호</label>
    <input type="password" id="password" placeholder="영문+숫자 포함" required>

    <label for="passwordConfirm">비밀번호 재입력</label>
    <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력" required>

    <button type="submit">가입하기</button>
  </form>
  <div id="message"></div>
  <div id="error"></div>
  <div class="footer">이미 계정이 있나요? <a href="/login.html">로그인</a></div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').textContent = '';
      document.getElementById('message').textContent = '';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (!/^(?=.*[A-Za-z])(?=.*\d).+$/.test(password)) {
        document.getElementById('error').textContent = '비밀번호는 영문과 숫자를 모두 포함해야 합니다.';
        return;
      }
      if (password !== passwordConfirm) {
        document.getElementById('error').textContent = '비밀번호가 일치하지 않습니다.';
        return;
      }

      try {
        const res = await fetch('/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '가입 실패');

        document.getElementById('message').textContent = '가입 완료!';
        setTimeout(() => { window.location.href = '/index.html'; }, 1000);
      } catch (err) {
        document.getElementById('error').textContent = err.message;
      }
    });
  </script>
</body>
</html>
