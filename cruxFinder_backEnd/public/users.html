<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>유저 목록</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f5f5f5; font-size: 0.85rem; color: #777; }
    a { display: inline-block; margin-top: 24px; color: #333; text-decoration: none; font-size: 0.9rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>유저 목록</h1>
  <table>
    <thead>
      <tr><th>ID</th><th>이름</th><th>이메일</th></tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>
  <a href="/signup.html">+ 회원가입</a>

  <script>
    fetch('/users')
      .then(res => res.json())
      .then(users => {
        const tbody = document.getElementById('userList');
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" style="color:#aaa">유저가 없습니다.</td></tr>';
          return;
        }
        tbody.innerHTML = users.map(u =>
          `<tr><td>${u.id}</td><td>${u.name ?? '-'}</td><td>${u.email}</td></tr>`
        ).join('');
      });
  </script>
</body>
</html>
